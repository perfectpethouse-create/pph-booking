<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Perfect Pet House — ระบบจองห้องพัก</title>
  <!-- ติดตั้งเป็นแอปบนหน้าจอโฮมได้ (Add to Home Screen) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F4650F" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PPH จอง" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- ฟอนต์ไทย fallback สำหรับเครื่องที่ไม่ใช่ Apple (บน Mac/iPhone ใช้ SF Pro ของระบบ) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- หน้าล็อกอิน -->
  <div id="login-screen">
    <div class="card">
      <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/></svg></div>
      <h1>Perfect Pet House</h1>
      <p class="muted" style="margin-top:-4px">ระบบบันทึกการจอง &amp; มัดจำ</p>
      <form id="login-form" style="margin-top:18px">
        <div class="field"><input type="email" id="login-email" placeholder="อีเมล" autocomplete="username" required /></div>
        <div class="field"><input type="password" id="login-pass" placeholder="รหัสผ่าน" autocomplete="current-password" required /></div>
        <button class="btn primary block" type="submit">เข้าสู่ระบบ</button>
        <p id="login-error" class="pill red hidden" style="margin-top:14px"></p>
      </form>
      <p class="muted" id="login-hint" style="font-size:12px;margin-top:16px"></p>
    </div>
  </div>

  <!-- แอปหลัก -->
  <div id="app" class="hidden">
    <nav id="sidebar">
      <div class="brand"><span class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/></svg></span><span class="txt">Perfect Pet House</span></div>
      <button class="navlink" data-route="dashboard" aria-label="แดชบอร์ดวันนี้"><span class="ico"></span><span class="txt">แดชบอร์ดวันนี้</span></button>
      <button class="navlink" data-route="today" aria-label="งานวันนี้"><span class="ico"></span><span class="txt">งานวันนี้</span></button>
      <button class="navlink" data-route="bookings" aria-label="การจองทั้งหมด"><span class="ico"></span><span class="txt">การจองทั้งหมด</span></button>
      <button class="navlink" data-route="calendar" aria-label="ปฏิทินห้องว่าง"><span class="ico"></span><span class="txt">ปฏิทินห้องว่าง</span></button>
      <button class="navlink" data-route="customers" aria-label="ลูกค้าและสัตว์เลี้ยง"><span class="ico"></span><span class="txt">ลูกค้า &amp; สัตว์เลี้ยง</span></button>
      <button class="navlink" data-route="registrations" aria-label="ลงทะเบียนเช็คอิน"><span class="ico"></span><span class="txt">ลงทะเบียนเช็คอิน</span></button>
      <button class="navlink" data-route="reports" aria-label="รายงานรายเดือน"><span class="ico"></span><span class="txt">รายงานรายเดือน</span></button>
      <button class="navlink" data-route="settings" aria-label="ตั้งค่า"><span class="ico"></span><span class="txt">ตั้งค่า</span></button>
      <button class="navlink" data-route="backup" aria-label="สำรองข้อมูล"><span class="ico"></span><span class="txt">สำรองข้อมูล</span></button>
      <div class="spacer"></div>
      <div class="who"><span id="who-email"></span><br /><button class="btn ghost sm" id="logout-btn" style="margin-top:8px">ออกจากระบบ</button></div>
    </nav>
    <div id="main">
      <div id="content"></div>
    </div>
  </div>

  <div class="mode-badge hidden" id="mode-badge"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" onerror="window.__h2cFallback=1"></script>
  <script>
    // สำรองแหล่งโหลด html2canvas ถ้าตัวแรกล่ม
    if (window.__h2cFallback) {
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(s);
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
